<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 35%, #e0f7fa 70%, #f9fbe7 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
  padding: 2rem;
}
.page { width: 100%; max-width: 420px; text-align: center; }

#surpriseScreen { display: none; }

.digit-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.5rem; }
.digit-box {
  width: 58px; height: 68px;
  border-radius: 16px;
  border: 2px solid #ccc;
  font-size: 28px;
  text-align: center;
}

.unlock-btn {
  padding: 12px;
  border: none;
  background: purple;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

.error-msg { color: red; margin-top: 10px; }

</style>
</head>
<body>

<div class="page">

<div id="lockScreen">
  <h2>Enter PIN</h2>

  <div class="digit-row">
    <input class="digit-box" maxlength="1" id="d1">
    <input class="digit-box" maxlength="1" id="d2">
    <input class="digit-box" maxlength="1" id="d3">
    <input class="digit-box" maxlength="1" id="d4">
  </div>

  <button class="unlock-btn" onclick="tryUnlock()">Unlock</button>
  <p class="error-msg" id="errorMsg"></p>
</div>

<div id="surpriseScreen">
  <h1>🎉 Unlocked 🎉</h1>
  <p>Happy Birthday ✨</p>
</div>

</div>

<script>

const SECRET = "2004";
const digits = ["d1","d2","d3","d4"];

// move focus + restrict input
digits.forEach((id, i) => {
  const el = document.getElementById(id);

  el.addEventListener("input", () => {
    el.value = el.value.replace(/\D/g, "").slice(0,1);

    if (el.value && i < 3) {
      document.getElementById(digits[i+1]).focus();
    }

    // auto submit when last digit entered
    if (i === 3 && el.value) {
      tryUnlock();
    }
  });

  el.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !el.value && i > 0) {
      document.getElementById(digits[i-1]).focus();
    }
  });
});

function getCode() {
  return digits.map(id => document.getElementById(id).value.trim()).join("");
}

function tryUnlock() {
  const code = getCode();
  const err = document.getElementById("errorMsg");

  if (code.length !== 4) {
    err.textContent = "Enter all 4 digits";
    return;
  }

  if (code === SECRET) {
    err.textContent = "";
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("surpriseScreen").style.display = "block";
  } else {
    err.textContent = "Wrong PIN";
    digits.forEach(id => document.getElementById(id).value = "");
    document.getElementById("d1").focus();
  }
}

// autofocus first box
document.getElementById("d1").focus();

</script>

</body>
</html>
